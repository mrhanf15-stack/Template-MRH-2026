{if isset($BOX_CONTENT) && $BOX_CONTENT != ''}
	{config_load file="$language/lang_$language.conf" section="boxes"}
	{config_load file="lang_`$language`.custom"}
	<div class="box_shipping_country card mb-4">
		<div class="box_header card-header">{#heading_shipping_country#}</div>
		<div class="card-body">
			<label for="box-shipping-country-select" class="sr-only">{#heading_shipping_country#}</label>
            {$BOX_CONTENT|replace:'<select':'<select id="box-shipping-country-select"'}
		</div>
	</div>
{/if}
