{config_load file="$language/lang_$language.conf" section="boxes"}
{config_load file="lang_`$language`.custom"}
<div class="box {$smarty.const.BS4_FOOTER_NAVBAR}">
  <div class="box-heading w-100 navbar-brand border-bottom mb-2">{#heading_guestnewsletter#}</div>
  <div id="capture_prospect" class="input-group">
    <form method="post" action="" id="capture_prospect">
      {*<!-- in diesem Beispiel soll die Email den Themenbereichen 1 und 3 zugeordnet werden -->*}
      <input type="hidden" name="topic_ids" id="prospect_topics" value="1,3">
      {*<!-- bitte nach eigenen Wünschen anpassen -->*}
      <div class="input-group" style="color: white;">
      {#new_anmelden#}
        <div class="form-group">
          <div id="subscribe_success" style="display: none;">
            <div class="infomessage"> {#new_reg#}</div>
          </div>
          <div id="capture_prospect_submit_button_loader"></div>
          <div id="error_invalid" style="display: none;">
            <div class="errormessage">{#err_ung#}</div>
          </div>
          <div id="error_duplicate" style="display: none;">
            <div class="errormessage">{#err_vorhanden#}</div>
          </div>
          <label for="prospect_email" class="sr-only">{#text_email#}</label>
          <input type="text" name="email_address" id="prospect_email" class="text form-control">
          <button id="capture_prospect_submit_button" class="capture_prospect_submit_button btn mb-2 mt-2 btn-info">{#butt_send#}</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="box navbar-dark">
  <div class="box-heading w-100 navbar-brand border-bottom mb-2">{#bk_footer#}</div>
 {1003237|contentAnywhere|inserttags}
</div>
