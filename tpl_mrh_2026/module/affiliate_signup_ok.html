{config_load file="$language/affiliate_lang_$language.conf" section="affiliate_signup_ok"}
{* MRH 2026: Affiliate Registrierung erfolgreich – BS5.3 *}
<div class="mrh-affiliate-signup-ok">
  <div class="card mb-4">
    <div class="card-header bg-success text-white">
      <h1 class="h6 mb-0"><span class="fa fa-check-circle me-2" aria-hidden="true"></span>{#heading_title#}</h1>
    </div>
    <div class="card-body">
      <div class="alert alert-success">
        <h2 class="alert-heading h6">{#text_success_title#}</h2>
        <p>{#text_information#}</p>
      </div>
      <div class="text-center mt-4">
        <a href="{$LINK_SUMMARY}" class="btn btn-primary btn-lg">
          <span class="fa fa-arrow-right me-1" aria-hidden="true"></span>{#button_continue#}
        </a>
      </div>
    </div>
    <div class="card-footer text-body-secondary">
      <p class="mb-0 small">{#text_footer_info#}</p>
    </div>
  </div>
</div>
