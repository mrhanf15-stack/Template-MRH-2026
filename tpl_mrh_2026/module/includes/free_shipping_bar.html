{config_load file="lang_free_shipping_bar.custom"}
{* MRH 2026: Versandkostenfrei-Anzeige – BS5.3 *}
<div id="mrh-free-shipping-bar" class="mrh-free-shipping-bar bg-success-subtle text-center py-1 small" data-threshold="{$smarty.const.MRH_FREE_SHIPPING_THRESHOLD|default:'0'}">
  <div class="container">
    <div class="d-flex align-items-center justify-content-center gap-2 flex-wrap">
      <span class="fa fa-truck text-success" aria-hidden="true"></span>
      <span class="mrh-fs-text" id="mrh-fs-text"></span>
      <div class="mrh-fs-progress d-inline-block" style="width:120px;height:6px;background:rgba(0,0,0,.1);border-radius:3px;overflow:hidden" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="mrh-fs-progress-fill bg-success" id="mrh-fs-progress-fill" style="height:100%;width:0%;transition:width .4s ease;border-radius:3px"></div>
      </div>
    </div>
  </div>
</div>
<script>
var fsbLangTexts = {
  remaining: '{#FSB_TEXT_REMAINING#}',
  reached: '{#FSB_TEXT_REACHED#}',
  free_shipping: '{#FSB_TEXT_FREE_SHIPPING#}',
  close: '{#FSB_TEXT_CLOSE#}'
};
</script>
