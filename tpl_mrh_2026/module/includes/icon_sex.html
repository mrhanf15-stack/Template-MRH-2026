{* ============================================================
   icon_sex.html – Dynamischer Geschlechts-/Typ-Badge
   Liest den Text direkt aus der Tabellenzelle (tr.fem/tr.reg)
   und erzeugt einen Badge oberhalb der Produktdaten-Tabelle.
   ============================================================ *}

<script>
(function() {
  'use strict';

  function createSexBadge() {
    /* ── Produktdaten-Tabelle finden: diejenige mit tr.fem / tr.reg ── */
    var tables = document.querySelectorAll('table.tebals.wite');
    var dataTable = null;
    var femRow = null;
    var regRow = null;

    for (var i = 0; i < tables.length; i++) {
      var f = tables[i].querySelector('tr.fem');
      var r = tables[i].querySelector('tr.reg');
      if (f || r) {
        dataTable = tables[i];
        femRow = f;
        regRow = r;
        break;
      }
    }

    if (!dataTable) return;

    /* ── Autoflowering-Picto prüfen ── */
    var picto = document.querySelector('.picto.templatestyle');
    var pictoHasOff = picto && picto.classList.contains('off');
    var pictoHasAuto = picto && !pictoHasOff && picto.querySelector('.shortfongc, .fa-tachometer');

    /* Wenn bereits ein sichtbarer Autoflowering-Badge existiert, nichts tun */
    if (pictoHasAuto) return;

    var type = null;
    var label = '';
    var icon = '';
    var colorClass = '';

    if (femRow) {
      type = 'fem';
      var lastTd = femRow.querySelector('td:last-child');
      label = lastTd ? lastTd.textContent.trim() : 'Feminisiert';
      icon = 'fa-venus';
      colorClass = 'mrh-badge-fem';
    } else if (regRow) {
      type = 'reg';
      var lastTd = regRow.querySelector('td:last-child');
      label = lastTd ? lastTd.textContent.trim() : 'Regulär';
      icon = 'fa-mars';
      colorClass = 'mrh-badge-reg';
    }

    if (!type) return;

    /* ── Badge-Element erstellen ── */
    var badge = document.createElement('div');
    badge.className = 'mrh-sex-badge ' + colorClass;
    badge.innerHTML = '<span class="fa fa-fw ' + icon + '"></span> ' + label;

    /* ── Badge vor der Tabelle einfügen ── */
    var container = dataTable.closest('.bg-custom.teabls') || dataTable.parentElement;
    if (container) {
      container.insertBefore(badge, dataTable);
    }
  }

  /* DOM Ready */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', createSexBadge);
  } else {
    createSexBadge();
  }
})();
</script>
