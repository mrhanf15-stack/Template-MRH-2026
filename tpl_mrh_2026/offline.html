{config_load file="$language/lang_$language.conf" section="index"}
<!DOCTYPE html>
<html lang="{$language}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{$store_name} – {#MRH_shop_offline_title#}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .offline-card { max-width: 540px; text-align: center; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <h1 class="h3 mb-3">{$store_name}</h1>
        <hr />
        <p class="text-muted">{$shop_offline_msg}</p>
      </div>
    </div>
  </div>
</body>
</html>
