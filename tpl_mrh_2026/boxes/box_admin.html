{if isset($BOX_CONTENT)}
{config_load file="$language/lang_$language.conf" section="boxes"}
{config_load file="lang_`$language`.custom"}
<div class="mrh-box-admin alert alert-info small" role="alert">
  <span class="fa fa-cog"></span> <strong>Admin:</strong>
  {foreach name=aussen item=box_data from=$BOX_CONTENT}
    <a href="{$box_data.HREF}" class="alert-link">{$box_data.NAME}</a>{if !$smarty.foreach.aussen.last} | {/if}
  {/foreach}
</div>
{/if}
