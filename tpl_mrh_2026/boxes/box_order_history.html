{if isset($BOX_CONTENT)}
{config_load file="$language/lang_$language.conf" section="boxes"}
{config_load file="lang_`$language`.custom"}
<div class="mrh-box-order-history">
  <h3 class="h6 fw-bold mb-3">{#heading_order_history#}</h3>
  <ul class="list-unstyled mb-0">
    {foreach name=aussen item=box_data from=$BOX_CONTENT}
      <li class="mb-1">
        <a href="{$box_data.HREF}" class="small text-decoration-none">{$box_data.NAME}</a>
      </li>
    {/foreach}
  </ul>
</div>
{/if}
