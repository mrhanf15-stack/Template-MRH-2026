{if isset($BOX_CONTENT) && count($BOX_CONTENT) > 1}
{config_load file="$language/lang_$language.conf" section="boxes"}
{config_load file="lang_`$language`.custom"}
{* MRH 2026: Sprachen werden im Header angezeigt *}
<div class="mrh-box-languages d-flex align-items-center gap-1">
  {foreach name=aussen item=box_data from=$BOX_CONTENT}
    <a href="{$box_data.HREF}" class="mrh-lang-flag{if $box_data.ACTIVE} active{/if}" title="{$box_data.NAME}">
      <img src="{$box_data.IMAGE}" alt="{$box_data.NAME}" width="20" height="14" loading="lazy">
    </a>
  {/foreach}
</div>
{/if}
